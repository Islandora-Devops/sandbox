variant: fcos
version: 1.4.0
passwd:
  users:
    - name: core
      groups:
        - docker
      # Paste the contents of Digital Ocean "default" public key in this field.
      # Consult Bitwarden.
      ssh_authorized_keys:
        - ssh-rsa 
        # add additional keys for other Islandora committers
        - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHZds7DX1z9IN0T7H/yXZrUIlOHiPzqK9oWN8brKh06e jjc223@Mac
systemd:
  units:
    - name: install-docker-compose.service
      enabled: true
      contents: |
        [Unit]
        Description=Install Docker Compose
        Requires=docker.service
        After=docker.service

        [Service]
        User=root
        Group=root
        Type=oneshot
        RemainAfterExit=true
        ExecStart=/usr/bin/sh -ec "mkdir -p /usr/local/lib/docker/cli-plugins && curl -L https://github.com/docker/compose/releases/download/v5.1.0/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose && chmod a+x /usr/local/lib/docker/cli-plugins/docker-compose"

        [Install]
        WantedBy=multi-user.target
    - name: rake.service
      enabled: true
      contents: |
        [Unit]
        Description=Rake Sandbox
        Requires=docker.service
        After=docker.service

        [Service]
        Type=oneshot
        ExecStart=/usr/bin/systemctl try-restart sandbox.service

        [Install]
        WantedBy=multi-user.target
    - name: rake.timer
      enabled: true
      contents: |
        [Unit]
        Description=Rake Sandbox Timer

        [Timer]
        OnCalendar=*-*-* 1:00:00 America/Halifax
        Persistent=True

        [Install]
        WantedBy=timers.target
    - name: install-make.service
      enabled: true
      contents: |
        [Unit]
        Description=Install make
        ConditionPathExists=!/usr/bin/make

        [Service]
        Type=oneshot
        RemainAfterExit=true
        ExecStart=/usr/bin/rpm-ostree install --apply-live make

        [Install]
        WantedBy=multi-user.target
    - name: setup-sandbox.service
      enabled: true
      contents: |
        [Unit]
        Description=Clone and initialise isle-site-template
        Requires=docker.service install-docker-compose.service install-make.service
        After=docker.service install-docker-compose.service install-make.service
        ConditionPathExists=!/opt/sandbox/isle-site-template

        [Service]
        User=core
        Group=core
        Type=oneshot
        RemainAfterExit=true
        ExecStart=/usr/bin/bash /opt/sandbox/setup.sh

        [Install]
        WantedBy=multi-user.target
    - name: sandbox.service
      enabled: true
      contents: |
        [Unit]
        Description=Islandora Sandbox
        PartOf=docker.service
        After=docker.service
        Requires=install-docker-compose.service
        After=install-docker-compose.service
        Requires=setup-sandbox.service
        After=setup-sandbox.service

        [Service]
        User=core
        Group=core
        WorkingDirectory=/opt/sandbox/isle-site-template
        ExecStartPre=/usr/bin/docker compose down -v
        ExecStart=/usr/bin/docker compose up
        ExecStop=/usr/bin/docker compose down -v

        [Install]
        WantedBy=multi-user.target
storage:
  directories:
    - path: /usr/local/lib/docker/cli-plugins
      mode: 0755
      user:
        name: root
      group:
        name: root
    - path: /opt/sandbox
      mode: 0755
      user:
        name: core
      group:
        name: core
    - path: /opt/sandbox/.secrets
      mode: 0700
      user:
        name: core
      group:
        name: core

  files:
    # Disable auto-updates.
    - path: /etc/zincati/config.d/90-disable-auto-updates.toml
      mode: 0644
      contents:
        inline: |
          [updates]
          enabled = false
    - path: /etc/ssh/sshd_config.d/60-packer.conf
      mode: 0600
      contents:
        inline: |
          PermitRootLogin no
          AllowUsers core
          AuthenticationMethods publickey
          PubkeyAcceptedKeyTypes +ssh-rsa
          PubkeyAcceptedAlgorithms +ssh-rsa
    - path: /opt/sandbox/.secrets/ACTIVEMQ_WEB_ADMIN_PASSWORD
      mode: 0600
      user:
        name: core
      group:
        name: core
      contents:
        inline: |
          ${ISLE_PASSWORD}
    - path: /opt/sandbox/.secrets/DRUPAL_DEFAULT_ACCOUNT_PASSWORD
      mode: 0600
      user:
        name: core
      group:
        name: core
      contents:
        inline: |
          ${ISLE_PASSWORD}
    - path: /opt/sandbox/setup.sh
      mode: 0750
      user:
        name: core
      group:
        name: core
      contents:
        local: setup.sh
    - path: /opt/sandbox/.env
      mode: 0644
      user:
        name: core
      group:
        name: core
      contents:
        local: sandbox.env
